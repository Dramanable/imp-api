# ─────────────────────────────────────────────────────────────────────────────
#  Nginx — LinkedIn Post Generator API
#  Domain : impalia-server.a3s-securite.com
#  Backend: http://127.0.0.1:3000 (PM2 cluster, 2 workers)
#
#  Special handling:
#   - /api/v1/linkedin-post/generate/stream → SSE, no buffering
#   - Certbot will automatically add the HTTPS server block below
# ─────────────────────────────────────────────────────────────────────────────

# Upstream pool (PM2 cluster already load-balances, so one address is enough)
upstream impalia_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# ── HTTP (port 80) — Certbot will convert this to a redirect ─────────────────
server {
    listen 80;
    listen [::]:80;
    server_name impalia-server.a3s-securite.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # All other traffic → redirect to HTTPS (Certbot fills this in)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) — populated by Certbot ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name impalia-server.a3s-securite.com;

    # ── SSL certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/impalia-server.a3s-securite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/impalia-server.a3s-securite.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # ── SSE endpoint — Server-Sent Events require no proxy buffering ─────────
    # Must come BEFORE the generic /api/ block (Nginx uses longest-prefix match).
    location /api/v1/linkedin-post/generate/stream {
        proxy_pass         http://impalia_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';   # Keep-alive for upstream

        # SSE MUST have buffering disabled — otherwise events are batched
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         300s;   # Long-lived connection (5 min max)
        proxy_send_timeout         60s;
        chunked_transfer_encoding  on;
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://impalia_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';

        proxy_buffering     on;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;

        # Security: hide upstream version
        proxy_hide_header X-Powered-By;
    }

    # ── Block access to anything outside /api/ ────────────────────────────────
    location / {
        return 404;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/impalia-access.log;
    error_log  /var/log/nginx/impalia-error.log warn;

    # ── Gzip (complements @fastify/compress for non-SSE responses) ───────────
    gzip            on;
    gzip_types      application/json text/plain;
    gzip_min_length 1024;
}
