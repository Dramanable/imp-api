# ─────────────────────────────────────────────────────────────────────────────
#  Nginx — LinkedIn Post Generator API  (HTTP-only / pre-Certbot)
#  Domain : impalia-server.a3s-securite.com
#
#  Used during first-time deployment BEFORE the TLS certificate exists.
#  Run `make vps-ssl` after this is in place to provision the cert.
#  vps-nginx-install.sh will automatically switch to the full config
#  (impalia-server.a3s-securite.com.conf) once the cert is available.
# ─────────────────────────────────────────────────────────────────────────────

upstream impalia_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name impalia-server.a3s-securite.com;

    # ── Let's Encrypt ACME challenge ─────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # ── Temporary HTTP proxy (will be replaced by HTTPS after vps-ssl) ───────
    location /api/v1/linkedin-post/generate/stream {
        proxy_pass         http://impalia_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         300s;
        chunked_transfer_encoding  on;
    }

    location /api/ {
        proxy_pass         http://impalia_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering     on;
        proxy_read_timeout  60s;
        proxy_hide_header X-Powered-By;
    }

    location / {
        return 404;
    }

    access_log /var/log/nginx/impalia-access.log;
    error_log  /var/log/nginx/impalia-error.log warn;
}
